# Namespace for the application
apiVersion: v1
kind: Namespace
metadata:
  name: html-app
---
# Secret for database credentials
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: html-app
type: Opaque
stringData:
  DB_NAME: myapp
  DB_USER: appuser
  DB_PASSWORD: secret123
  POSTGRES_DB: myapp
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: secret123
---
# ConfigMap for database initialization script
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-db-configmap
  namespace: html-app
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100),
      email VARCHAR(100)
    );
