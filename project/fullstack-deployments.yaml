# Frontend Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: html-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-app
  template:
    metadata:
      labels:
        app: html-app
    spec:
      containers:
      - name: frontend-web
        image: manojt5/project-frontend:${COMMIT_SHA}
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

# Backend Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: html-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-api
        image: manojt5/project-backend:${COMMIT_SHA}
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: database
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: myapp
        - name: DB_USER
          value: appuser
        - name: DB_PASSWORD
          value: secret123
        - name: REDIS_HOST
          value: cache
        - name: REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: html-app
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000

# Postgres Deployment + Service (no persistence)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: html-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: postgres-db
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: myapp
        - name: POSTGRES_USER
          value: appuser
        - name: POSTGRES_PASSWORD
          value: secret123
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-db-scripts
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
      volumes:
      - name: postgres-data
        emptyDir: {}
      - name: init-db-scripts
        configMap:
          name: init-db-configmap
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: html-app
spec:
  type: ClusterIP
  selector:
    app: database
  ports:
  - port: 5432
    targetPort: 5432

# Redis Deployment + Service (no persistence)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: html-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
      - name: redis-cache
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: html-app
spec:
  type: ClusterIP
  selector:
    app: cache
  ports:
  - port: 6379
    targetPort: 6379