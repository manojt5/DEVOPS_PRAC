<!DOCTYPE html>
<html>
<head>
  <title>Simple App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    h2 {
      margin-top: 30px;
      color: #34495e;
    }

    a {
      display: inline-block;
      margin: 10px 0;
      text-decoration: none;
      color: #2980b9;
      font-weight: bold;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 20px auto;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background: #27ae60;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }

    button:hover {
      background: #219150;
    }

    .users-btn {
      display: block;
      margin: 20px auto;
      background: #2980b9;
    }

    .users-btn:hover {
      background: #1f6391;
    }
  </style>
</head>
<body>
  <h1>Welcome</h1>
  <div style="text-align:center;">
    <a href="about.html">About</a>
  </div>

  <h2>Submit Form</h2>
  <form action="/api/submit" method="POST">
    <label>Name:
      <input type="text" name="name">
    </label>
    <label>Email:
      <input type="text" name="email">
    </label>
    <button type="submit">Submit</button>
  </form>

  <h2 style="text-align:center;">View All Users</h2>
  <button class="users-btn" onclick="window.location.href='users.html'">View Users</button>
</body>
</html>
