apiVersion: v1
kind: Pod
metadata:
  name: cache
  namespace: html-app
  labels:
    app: cache
spec:
  containers:
  - name: redis-cache
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumeMounts:
    - name: redis-data
      mountPath: /data
  volumes:
  - name: redis-data
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: html-app
spec:
  selector:
    app: cache
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP