apiVersion: v1
kind: Pod
metadata:
  name: database
  namespace: html-app
  labels:
    app: database
spec:
  containers:
  - name: postgres-db
    image: postgres:15-alpine
    env:
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: POSTGRES_DB
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: POSTGRES_USER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: POSTGRES_PASSWORD
    volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data
  volumes:
  - name: postgres-data
    emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: html-app
spec:
  selector:
    app: database
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP