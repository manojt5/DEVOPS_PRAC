apiVersion: v1
kind: Pod
metadata:
  name: fullstack-pod
  namespace: html-app
  labels:
    app: html-app
spec:
  containers:
  - name: frontend-web
    image: manojt5/project-frontend:latest
    ports:
    - containerPort: 80
    # frontend can reach backend at localhost:3000
  - name: backend-api
    image: manojt5/project-backend:latest
    ports:
    - containerPort: 3000
    env:
    - name: DB_HOST
      value: localhost
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: myapp
    - name: DB_USER
      value: appuser
    - name: DB_PASSWORD
      value: secret123
    - name: REDIS_HOST
      value: localhost
    - name: REDIS_PORT
      value: "6379"
  - name: postgres-db
    image: postgres:15-alpine
    env:
    - name: POSTGRES_DB
      value: myapp
    - name: POSTGRES_USER
      value: appuser
    - name: POSTGRES_PASSWORD
      value: secret123
    volumeMounts:
    - name: postgres-data
      mountPath: /var/lib/postgresql/data
  - name: redis-cache
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumeMounts:
    - name: redis-data
      mountPath: /data
  volumes:
  - name: postgres-data
    emptyDir: {}
  - name: redis-data
    emptyDir: {}