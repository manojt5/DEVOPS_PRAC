apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: html-app
  labels:
    app: backend
spec:
  containers:
  - name: backend-api
    image: manojt5/project-backend:latest
    ports:
    - containerPort: 3000
    env:
    - name: DB_HOST
      value: database
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: myapp
    - name: DB_USER
      value: appuser
    - name: DB_PASSWORD
      value: secret123
    - name: REDIS_HOST
      value: cache
    - name: REDIS_PORT
      value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: html-app
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP