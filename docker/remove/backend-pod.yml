apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: html-app
  labels:
    app: backend
spec:
  containers:
  - name: backend-api
    image: manojt5/project-backend:latest
    ports:
    - containerPort: 3000
    env:
    - name: DB_HOST
      value: database
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_NAME
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_USER
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_PASSWORD
    - name: REDIS_HOST
      value: cache
    - name: REDIS_PORT
      value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: html-app
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP